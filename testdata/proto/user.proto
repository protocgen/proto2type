syntax = "proto3";
package test.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/protocgen/proto2type/testdata/golden/go/pb";

// UserStatus represents the user's account status.
enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_SUSPENDED = 2;
  USER_STATUS_DELETED = 3;
}

// User represents a user account.
message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  bool active = 4;
  int32 age = 5;
  repeated string roles = 6;
  map<string, string> metadata = 7;
  Address address = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Duration session_timeout = 10;
  optional string phone = 11;
  bytes avatar = 12;
  google.protobuf.StringValue nickname = 13;
  UserStatus status = 14;

  oneof contact_method {
    string contact_email = 15;
    string contact_phone = 16;
  }
  repeated Tag tags = 17;
  optional google.protobuf.Timestamp deleted_at = 18;
  optional UserStatus previous_status = 19;

  // WKT reference types
  google.protobuf.FieldMask update_mask = 20;
  google.protobuf.Struct extra_metadata = 21;
  google.protobuf.ListValue preferences = 22;

  // Optional bytes
  optional bytes avatar_thumbnail = 23;

  // Repeated WKT reference types (Issue #52)
  repeated google.protobuf.FieldMask field_masks = 24;
  repeated google.protobuf.Struct structs = 25;
  repeated google.protobuf.ListValue lists = 26;

  // WKT map values (Issue #53)
  map<string, google.protobuf.Timestamp> event_times = 27;
  map<string, google.protobuf.Struct> configs = 28;
}

// Address is a nested message.
message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string zip = 4;
  string country = 5;
}

// Tag is a label with a key-value pair.
message Tag {
  string key = 1;
  string value = 2;
}
