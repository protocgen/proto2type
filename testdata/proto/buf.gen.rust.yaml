version: v2
inputs:
  - directory: .
    paths:
      - user.proto
      - catalog.proto
      - keywords.proto
plugins:
  # Rust domain types
  - local: protoc-gen-proto2type
    out: ../golden/rust/gen
    opt:
      - paths=source_relative
      - lang=rust

  # Rust SQLite storage types
  - local: protoc-gen-proto2type
    out: ../golden/rust/gen
    opt:
      - paths=source_relative
      - lang=rust
      - backend=sqlite
      - domain=false

  # Rust buffa (ConnectRPC proto) conversion types
  - local: protoc-gen-proto2type
    out: ../golden/rust/gen
    opt:
      - paths=source_relative
      - lang=rust
      - backend=buffa
      - domain=false
      - buffa_module=crate::proto
