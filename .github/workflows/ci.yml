name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o protoc-gen-proto2type .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Check gofmt
        run: |
          GOFMT_OUTPUT=$(gofmt -l .)
          if [ -n "$GOFMT_OUTPUT" ]; then
            echo "The following files are not formatted:"
            echo "$GOFMT_OUTPUT"
            exit 1
          fi

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: actionlint

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-dir=testdata -exclude-dir=proto ./...

  golden-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Build plugin
        run: go build -o protoc-gen-proto2type .

      - name: Add plugin to PATH
        run: echo "$PWD" >> "$GITHUB_PATH"

      - name: Regenerate golden files
        run: |
          cd testdata/proto
          buf generate
          buf generate --template buf.gen.kotlin.yaml
          buf generate --template buf.gen.complex-domain.yaml

      - name: Check for differences
        run: git diff --exit-code testdata/golden/

  golden-test-rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1

      - name: Build plugin
        run: go build -o protoc-gen-proto2type .

      - name: Add plugin to PATH
        run: echo "$PWD" >> "$GITHUB_PATH"

      - name: Regenerate Rust golden files
        run: |
          cd testdata/proto
          buf generate --template buf.gen.rust.yaml
          buf generate --template buf.gen.complex-domain.yaml

      - name: Check for Rust golden file drift
        run: git diff --exit-code testdata/golden/rust/

  rust-compile-check:
    runs-on: ubuntu-latest
    needs: golden-test-rust
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Create compile-check Cargo project
        run: |
          mkdir -p /tmp/rust-compile-check/src
          cat > /tmp/rust-compile-check/Cargo.toml <<'EOF'
          [package]
          name = "proto2type-compile-check"
          version = "0.0.0"
          edition = "2021"
          publish = false

          [dependencies]
          serde = { version = "1", features = ["derive"] }
          serde_json = "1"
          chrono = { version = "0.4.20", features = ["serde"] }
          rusqlite = { version = "0.35", features = ["bundled"] }
          EOF
          sed -i 's/^          //' /tmp/rust-compile-check/Cargo.toml

          # For each proto (e.g. catalog, user), create a module directory:
          # src/catalog/mod.rs   (domain types)
          # src/catalog/sqlite.rs (storage types, uses super::*)
          echo '// Auto-generated compile check' > /tmp/rust-compile-check/src/lib.rs
          for domain_file in testdata/golden/rust/gen/*.type.rs; do
            base=$(basename "$domain_file" .type.rs)
            # Skip sqlite files, they'll be handled as submodules
            if echo "$base" | grep -q '_sqlite$'; then
              continue
            fi
            # Create module directory
            mkdir -p "/tmp/rust-compile-check/src/${base}"
            # Copy domain file as mod.rs
            cp "$domain_file" "/tmp/rust-compile-check/src/${base}/mod.rs"
            # Add the sqlite submodule declaration to mod.rs
            sqlite_file="testdata/golden/rust/gen/${base}_sqlite.type.rs"
            if [ -f "$sqlite_file" ]; then
              echo '' >> "/tmp/rust-compile-check/src/${base}/mod.rs"
              echo 'pub mod sqlite;' >> "/tmp/rust-compile-check/src/${base}/mod.rs"
              cp "$sqlite_file" "/tmp/rust-compile-check/src/${base}/sqlite.rs"
            fi
            # Register in lib.rs
            echo "pub mod ${base};" >> /tmp/rust-compile-check/src/lib.rs
          done

      - name: Cargo check generated Rust code
        run: cargo check --manifest-path /tmp/rust-compile-check/Cargo.toml

      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit generated code dependencies
        run: cd /tmp/rust-compile-check && cargo audit

  integration-db:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          github_token: ${{ github.token }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firestore emulator
        run: |
          firebase emulators:start --only firestore --project demo-test &
          # Wait for emulator to be ready
          for _ in $(seq 1 30); do
            curl -s http://localhost:8080 > /dev/null && break
            sleep 1
          done
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Build plugin
        run: go build -o protoc-gen-proto2type .

      - name: Generate test types
        run: |
          cd testdata/proto
          PATH="$(git rev-parse --show-toplevel):$PATH" buf generate

      - name: Run integration tests
        run: go test -tags integration ./tests/integration/... -v -count=1
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          MONGO_URI: mongodb://localhost:27017

  rust-integration-test:
    runs-on: ubuntu-latest
    needs: golden-test-rust
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - name: Refresh and test
        run: |
          bash tests/rust-integration/refresh.sh
          cd tests/rust-integration && cargo test -- --nocapture
