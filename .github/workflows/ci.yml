name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o protoc-gen-proto2type .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Check gofmt
        run: |
          GOFMT_OUTPUT=$(gofmt -l .)
          if [ -n "$GOFMT_OUTPUT" ]; then
            echo "The following files are not formatted:"
            echo "$GOFMT_OUTPUT"
            exit 1
          fi

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: actionlint

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-dir=testdata -exclude-dir=proto ./...

  golden-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Build plugin
        run: go build -o protoc-gen-proto2type .

      - name: Add plugin to PATH
        run: echo "$PWD" >> "$GITHUB_PATH"

      - name: Regenerate golden files
        run: cd testdata/proto && buf generate

      - name: Check for differences
        run: git diff --exit-code

  integration-db:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          github_token: ${{ github.token }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firestore emulator
        run: |
          firebase emulators:start --only firestore --project demo-test &
          # Wait for emulator to be ready
          for _ in $(seq 1 30); do
            curl -s http://localhost:8080 > /dev/null && break
            sleep 1
          done
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Build plugin
        run: go build -o protoc-gen-proto2type .

      - name: Generate test types
        run: |
          cd testdata/proto
          PATH="$(git rev-parse --show-toplevel):$PATH" buf generate

      - name: Run integration tests
        run: go test -tags integration ./tests/integration/... -v -count=1
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          MONGO_URI: mongodb://localhost:27017
